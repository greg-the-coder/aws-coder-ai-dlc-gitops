apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coder-workspace-provisioner
rules:
  - apiGroups: [""]
    resources:
      - pods
      - persistentvolumeclaims
      - services
      - secrets
      - configmaps
      - serviceaccounts
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs: ["*"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - events
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder-workspace-provisioner
  namespace: coder-ws
subjects:
  - kind: ServiceAccount
    name: coder
    namespace: coder
roleRef:
  kind: ClusterRole
  name: coder-workspace-provisioner
  apiGroup: rbac.authorization.k8s.io
